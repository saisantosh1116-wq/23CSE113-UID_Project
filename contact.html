<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSK Portfolio | Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="fade-in">
   <nav>
        <a href="index.html" class="logo">SSK</a>
        
        <input type="checkbox" id="nav-toggle" class="nav-toggle">
        <label for="nav-toggle" class="nav-toggle-label">
            <span></span>
            <span></span>
            <span></span>
        </label>
        
        <ul class="nav-links">
            <li><a href="index.html" >Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <main class="main-container">
        <header class="section">
            <h1 class="section-title card-load-slide">Get In Touch</h1>
            
            <div class="glass-panel card-load-slide card-load-slide-delay-1">
                <div class="grid-2">
                    <div class="glass-inner">
                        <p class="text-muted">Currently open to collaborations, internships, or conversations about contemporary software developments in the world.</p>
                    </div>
                    <div class="glass-inner">
                        <p><strong>Primary Location:</strong><br>
                        Amritapuri Campus,<br>
                        Kollam, Kerala</p>
                    </div>
                </div>
            </div>
        </header>

        <section class="section">
            <div class="glass-panel contact-card card-load-slide card-load-slide-delay-1">
                <h3>Send a Message</h3>
                <form class="contact-form mt-20">
                    <input type="text" placeholder="Your Name" required class="glass-input">
                    <input type="email" placeholder="Your Email" required class="glass-input">
                    <textarea placeholder="Your Message" rows="6" required class="glass-textarea"></textarea>
                    <button type="submit" class="btn">Send Message</button>
                </form>
                
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Built with HTML, CSS and help.. </p>
    </footer>
